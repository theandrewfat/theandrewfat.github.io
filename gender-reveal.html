<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Un bebé en camino 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #FFFBF5;
      --ink:    #2a2118;
      --ink-2:  #7a6a58;
      --ink-3:  #bba898;
      --coral:  #FF6B6B;
      --yellow: #FFD166;
      --mint:   #06D6A0;
      --violet: #9B72CF;
      --sky:    #4ECDC4;
      --blue:   #3A86FF;
      --serif:  'Fraunces', Georgia, serif;
      --sans:   'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { font-size:16px; }

    body {
      min-height: 100vh;
      font-family: var(--sans);
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background 1.2s;
      background: var(--bg);
      background-image: radial-gradient(circle, rgba(255,107,107,.07) 1px, transparent 1px),
                        radial-gradient(circle, rgba(255,209,102,.07) 1px, transparent 1px);
      background-size: 28px 28px, 42px 42px;
      background-position: 0 0, 14px 14px;
    }
    body.boy { background-color: #EEF6FF; }

    .bg-piece {
      position: fixed; pointer-events: none; z-index: 0;
      opacity: var(--op);
      animation: bgDrift var(--bd) ease-in-out var(--bdel) infinite;
      border-radius: var(--br);
    }
    @keyframes bgDrift {
      0%,100% { transform: translateY(0) rotate(var(--rot)); }
      50%      { transform: translateY(var(--dy)) rotate(calc(var(--rot) + 12deg)); }
    }

    .ficon {
      position: fixed; pointer-events: none; z-index: 0;
      font-size: var(--fs); opacity: 0;
      animation: iconDrift var(--fd) ease-in-out var(--fdel) infinite;
    }
    @keyframes iconDrift {
      0%,100% { opacity:0; transform: translateY(0) scale(.8) rotate(var(--fr)); }
      20%,80% { opacity: var(--fop); }
      50%      { transform: translateY(var(--fy)) scale(1) rotate(calc(var(--fr) + 8deg)); }
    }

    #pg {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
      min-height: 100vh; max-height: 100vh;
      overflow: hidden; padding: 2.5rem 2rem;
    }

    /* Each third takes equal space; content centered within it */
    .pg-top, .pg-mid, .pg-bot {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 100%;
    }
    .pg-mid { justify-content: flex-end; padding-bottom: 1.5rem; }

    /* Text anchored to top */
    .hero {
      font-family: var(--serif);
      font-size: clamp(2rem, 5.5vw, 3.8rem);
      font-weight: 600; font-style: italic;
      line-height: 1.05; text-align: center;
      color: var(--ink-3);
      opacity: 0; animation: popUp .7s .1s cubic-bezier(.34,1.56,.64,1) both;
      transition: color .6s;
    }
    body.boy .hero { color: var(--blue); }

    /* ── ORB ── */
    .orb-wrap {
      position: relative;
      width: clamp(180px, 40vmin, 280px);
      height: clamp(180px, 40vmin, 280px);
      flex-shrink: 0;
      perspective: 700px; opacity: 0;
      animation: popUp .7s .4s cubic-bezier(.34,1.56,.64,1) both;
    }

    .ripple {
      position: absolute; inset: 0; border-radius: 50%;
      opacity: 0;
      animation: rippleOut var(--rd) ease-out var(--rdel) infinite;
      border: 2px solid var(--rc);
    }
    .ripple:nth-child(1) { --rc: var(--blue);  --rd: 3s; --rdel: 0s;    }
    .ripple:nth-child(2) { --rc: #F4A0C0;      --rd: 3s; --rdel: 1.5s;  }
    body.boy .ripple { --rc: var(--blue); }
    @keyframes rippleOut {
      0%   { transform: scale(.55); opacity: .8; }
      100% { transform: scale(1.7);  opacity: 0; }
    }

    .orb-core {
      position: absolute; inset: 0; border-radius: 50%;
      background: transparent; border: 3px solid var(--ink-3);
      box-shadow: 0 4px 0 rgba(0,0,0,.06), 0 8px 32px rgba(187,168,152,.25);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      animation: orbBounce 2.8s ease-in-out infinite;
      transition: border-color .6s, box-shadow .6s;
    }
    body.boy .orb-core {
      border-color: var(--blue); animation: none;
      box-shadow: 0 4px 0 rgba(0,0,0,.06), 0 8px 40px rgba(58,134,255,.3);
    }
    @keyframes orbBounce {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-6px) scale(1.02); }
    }

    .orb-core.spin { animation: coinFlip 1.6s cubic-bezier(.4,0,.2,1) forwards; }
    @keyframes coinFlip {
      0%   { transform: rotateY(0deg)  scale(1); }
      45%  { transform: rotateY(90deg) scale(.88); }
      55%  { transform: rotateY(90deg) scale(.88); }
      100% { transform: rotateY(0deg)  scale(1); }
    }

    .orb-symbol {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 8vw, 3.4rem);
      font-style: italic; font-weight: 600;
      color: var(--yellow); user-select: none;
      animation: symPulse 2.8s ease-in-out infinite;
    }
    body.boy .orb-symbol { animation:none; color:var(--ink); font-style:normal; font-size:clamp(1.8rem,7vw,2.8rem); }
    @keyframes symPulse {
      0%,100% { transform:scale(1); color:var(--yellow); }
      50%      { transform:scale(1.12); color:var(--coral); }
    }

    .orb-img-wrap {
      position: absolute; inset: 0;
      border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .orb-img {
      width: 293px; height: 214px;
      object-fit: cover; object-position: center;
      mix-blend-mode: multiply;
      animation: orbBounce 2.8s ease-in-out infinite;
    }
    body.boy .orb-img { animation: none; mix-blend-mode: normal; }
    @keyframes dotFloat {
      0%,100% { opacity:0; transform:translateY(0) scale(.4); }
      40%      { opacity:.7; }
      70%      { opacity:.3; transform:translateY(-18px) scale(1.1); }
    }

    /* ── COUNTDOWN ── */
    .countdown-section {
      text-align:center;
      animation: popUp .7s .65s cubic-bezier(.34,1.56,.64,1) both;
    }
    .c-sup { font-size:.99rem; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-3); font-weight:400; margin-bottom:.5rem; }
    .c-row { display:flex; align-items:flex-start; justify-content:center; gap:clamp(.3rem,1.8vw,1rem); }
    .c-block { display:flex; flex-direction:column; align-items:center; gap:.2rem; }
    .c-num {
      font-family:var(--serif);
      font-size:clamp(2.6rem,7vw,5.2rem);
      font-weight:600; line-height:1;
      min-width:clamp(3rem,7.5vw,5.8rem); text-align:center;
    }
    #cD { color: var(--blue); }
    #cH { color: #F4A0C0; }
    #cM { color: var(--blue); }
    #cS { color: #F4A0C0; }
    .c-num.tick { animation:numTick .14s ease; }
    @keyframes numTick {
      0%  { transform:translateY(-5px) scale(.9); opacity:.5; }
      100%{ transform:translateY(0) scale(1); opacity:1; }
    }
    .c-lbl { font-size:.58rem; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-3); font-weight:400; }
    .c-sep { font-family:var(--serif); font-size:clamp(2rem,5vw,4rem); font-weight:300; color:rgba(42,33,24,.12); line-height:1.2; align-self:flex-start; padding-top:.1rem; }
    .c-date { margin-top:.7rem; font-size:.65rem; letter-spacing:.1em; color:var(--ink-3); font-weight:300; }

    /* ── ARRIVED ── */
    .arrived { display:none; flex-direction:column; align-items:center; gap:.9rem; text-align:center; margin-top:0; }
    .arrived.show { display:flex; animation:popUp .5s cubic-bezier(.34,1.56,.64,1) both; }
    .arrived-title { font-family:var(--serif); font-size:clamp(1.3rem,3.5vw,1.8rem); font-style:italic; font-weight:300; color:var(--ink); }
    .btn-reveal {
      padding:.85rem 2.6rem; border:2px solid var(--ink); border-radius:100px;
      background:var(--ink); color:white;
      font-family:var(--sans); font-size:.75rem; font-weight:400;
      letter-spacing:.2em; text-transform:uppercase; cursor:pointer;
      transition:transform .15s, box-shadow .15s;
      box-shadow:0 4px 0 rgba(0,0,0,.15);
    }
    .btn-reveal:hover { transform:translateY(-2px); box-shadow:0 6px 0 rgba(0,0,0,.15); }
    .btn-reveal:active { transform:translateY(1px); box-shadow:0 2px 0 rgba(0,0,0,.15); }

    /* ── CONFETTI ── */
    .cf { position:fixed; top:-16px; pointer-events:none; z-index:999; animation:cfFall var(--cfd) linear var(--cfde) forwards; border-radius:var(--cfr); }
    @keyframes cfFall {
      0%   { transform:translateY(0) translateX(0) rotate(0); opacity:1; }
      100% { transform:translateY(115vh) translateX(var(--cfx)) rotate(600deg); opacity:0; }
    }

    @keyframes popUp {
      from { opacity:0; transform:translateY(20px) scale(.95); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
  </style>
</head>
<body>

<!-- TEST BUTTON -->
<button onclick="doReveal()" id="testBtn" style="
  position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%);
  z-index:300; padding:.5rem 1.5rem;
  border:1.5px solid rgba(42,33,24,.15); border-radius:100px;
  background:rgba(255,251,245,.9); backdrop-filter:blur(8px);
  font-family:'DM Sans',sans-serif; font-size:.62rem; font-weight:400;
  letter-spacing:.16em; text-transform:uppercase; color:#bba898;
  cursor:pointer;">Probar revelación</button>

<div id="pg">

  <div class="pg-top">
    <h1 class="hero">¿Seré niño o niña?</h1>
  </div>

  <div class="pg-mid">
    <div class="orb-wrap" id="orbWrap">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="orb-core" id="orbCore">
        <div class="orb-img-wrap">
          <img id="orbImg" class="orb-img" src="./bb.png" alt=""/>
        </div>
        <span class="orb-symbol orb-reveal-sym" id="orbSymbol" style="display:none"></span>
      </div>
    </div>

  </div>

  <div class="pg-bot" id="bottomSlot">
    <div class="arrived" id="arrived">
      <p class="arrived-title">El momento ha llegado</p>
      <button class="btn-reveal" onclick="doReveal()">Descubrir</button>
    </div>

    <div class="countdown-section" id="cdSection">
      <p class="c-sup">La revelación en</p>
      <div class="c-row" id="cRow">
        <div class="c-block"><div class="c-num" id="cD">––</div><div class="c-lbl">días</div></div>
        <div class="c-sep">·</div>
        <div class="c-block"><div class="c-num" id="cH">––</div><div class="c-lbl">horas</div></div>
        <div class="c-sep">·</div>
        <div class="c-block"><div class="c-num" id="cM">––</div><div class="c-lbl">min</div></div>
        <div class="c-sep">·</div>
        <div class="c-block"><div class="c-num" id="cS">––</div><div class="c-lbl">seg</div></div>
      </div>

    </div>
  </div>

</div>

<script>
let targetDate = new Date('2026-03-09T20:30:00');
let ticker  = null;
let revealed = false;

const COLORS = ['#FF6B6B','#FFD166','#06D6A0','#9B72CF','#4ECDC4','#3A86FF','#FF9F1C'];

(function init() {
  buildBgPieces();
  startTicker();
})();

function buildBgPieces() {
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'bg-piece';
    const w = 8 + Math.random()*18;
    const h = Math.random()>.5 ? w : 5+Math.random()*8;
    const col = COLORS[~~(Math.random()*COLORS.length)];
    el.style.cssText = `width:${w}px;height:${h}px;background:${col};top:${Math.random()*100}%;left:${Math.random()*100}%;--op:${.06+Math.random()*.1};--bd:${4+Math.random()*6}s;--bdel:${-Math.random()*6}s;--dy:${(Math.random()-.5)*30}px;--rot:${Math.random()*360}deg;--br:${Math.random()>.5?'3px':'50%'};`;
    document.body.appendChild(el);
  }
}

function startTicker() {
  if (ticker) clearInterval(ticker);
  tick(); ticker = setInterval(tick, 1000);
}

function tick() {
  const cRow    = document.getElementById('cRow');
  const arrived = document.getElementById('arrived');
  const now     = new Date();

  const diff = targetDate - now;
  if (diff <= 0) {
    cRow.style.visibility = 'hidden';
    document.querySelector('.c-sup').style.display = 'none';

    arrived.classList.add('show');
    clearInterval(ticker); return;
  }
  cRow.style.visibility = 'visible';
  arrived.classList.remove('show');
  const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000),
        m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
  setN('cD',pad(d)); setN('cH',pad(h)); setN('cM',pad(m)); setN('cS',pad(s));
}

function pad(n) { return String(n).padStart(2,'0'); }
function setN(id,val) {
  const el=document.getElementById(id);
  if(el.textContent!==val){ el.classList.remove('tick'); void el.offsetWidth; el.classList.add('tick'); el.textContent=val; }
}

function doReveal() {
  if (revealed) return;
  revealed = true;
  const core=document.getElementById('orbCore'), symbol=document.getElementById('orbSymbol'),
        cdSec=document.getElementById('cdSection'),
        arr=document.getElementById('arrived'), hero=document.querySelector('.hero'),
        testBtn=document.getElementById('testBtn');
  if (testBtn) testBtn.style.display='none';

  core.classList.add('spin');

  setTimeout(() => {
    const orbImg = document.getElementById('orbImg');
    if (orbImg) orbImg.src = './bb_b.png';
    symbol.style.display = 'none';
    document.body.classList.add('boy');
  }, 800);

  setTimeout(() => {
    hero.textContent = '¡Soy un niño!';
    cdSec.style.transition='opacity .4s'; cdSec.style.opacity='0';
    setTimeout(()=>document.getElementById('bottomSlot').style.display='none',400);
    arr.style.display='none';
    playFanfare();
    boom();
  }, 1800);
}

function playFanfare() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const melody = [523,659,784,1047,784,1047,1047];
    const times = [0,.12,.24,.38,.55,.68,.80];
    const durs  = [.15,.14,.15,.22,.15,.14,.4];

    melody.forEach((freq,i) => {
      const t = ctx.currentTime+times[i];
      // Main sine tone
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq;
      gain.gain.setValueAtTime(.0001,t);
      gain.gain.exponentialRampToValueAtTime(.22,t+.02);
      gain.gain.exponentialRampToValueAtTime(.0001,t+durs[i]);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+durs[i]+.05);
      // Octave shimmer
      const osc2=ctx.createOscillator(), gain2=ctx.createGain();
      osc2.type='triangle'; osc2.frequency.value=freq*2;
      gain2.gain.setValueAtTime(.05,t);
      gain2.gain.exponentialRampToValueAtTime(.001,t+durs[i]+.05);
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.start(t); osc2.stop(t+durs[i]+.05);
    });

    // Final chord
    [523,659,784].forEach((freq,i) => {
      const t=ctx.currentTime+1.0;
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq;
      gain.gain.setValueAtTime(.0001,t);
      gain.gain.exponentialRampToValueAtTime(.12-i*.03,t+.05);
      gain.gain.exponentialRampToValueAtTime(.0001,t+1.2);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+1.3);
    });
  } catch(e){}
}

function boom() {
  const palette = ['#ffffff','#3A86FF','#74b3ff','#FFD166','#06D6A0','#b8d8ff'];
  for(let i=0;i<260;i++){
    const el=document.createElement('div'); el.className='cf';
    const w=5+Math.random()*10,h=5+Math.random()*18,r=Math.random();
    el.style.cssText=`left:${Math.random()*100}vw;width:${w}px;height:${h}px;background:${palette[~~(Math.random()*palette.length)]};--cfd:${1.8+Math.random()*2.8}s;--cfde:${Math.random()*.9}s;--cfx:${(Math.random()-.5)*340}px;--cfr:${r>.6?'50%':r>.3?'2px':'0'};`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}
</script>
</body>
</html>
