<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Un bebé en camino 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #FFFBF5;
      --ink:    #2a2118;
      --ink-2:  #7a6a58;
      --ink-3:  #bba898;
      --coral:  #FF6B6B;
      --yellow: #FFD166;
      --mint:   #06D6A0;
      --violet: #9B72CF;
      --sky:    #4ECDC4;
      --blue:   #3A86FF;
      --serif:  'Fraunces', Georgia, serif;
      --sans:   'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { font-size:16px; }

    body {
      min-height: 100vh;
      font-family: var(--sans);
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background 1.2s;
      background: var(--bg);
      background-image: radial-gradient(circle, rgba(255,107,107,.07) 1px, transparent 1px),
                        radial-gradient(circle, rgba(255,209,102,.07) 1px, transparent 1px);
      background-size: 28px 28px, 42px 42px;
      background-position: 0 0, 14px 14px;
    }
    body.boy { background-color: #EEF6FF; }

    .bg-piece {
      position: fixed; pointer-events: none; z-index: 0;
      opacity: var(--op);
      animation: bgDrift var(--bd) ease-in-out var(--bdel) infinite;
      border-radius: var(--br);
    }
    @keyframes bgDrift {
      0%,100% { transform: translateY(0) rotate(var(--rot)); }
      50%      { transform: translateY(var(--dy)) rotate(calc(var(--rot) + 12deg)); }
    }

    .ficon {
      position: fixed; pointer-events: none; z-index: 0;
      font-size: var(--fs); opacity: 0;
      animation: iconDrift var(--fd) ease-in-out var(--fdel) infinite;
    }
    @keyframes iconDrift {
      0%,100% { opacity:0; transform: translateY(0) scale(.8) rotate(var(--fr)); }
      20%,80% { opacity: var(--fop); }
      50%      { transform: translateY(var(--fy)) scale(1) rotate(calc(var(--fr) + 8deg)); }
    }

    #pg {
      position: relative; z-index: 1;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      align-items: center;
      justify-items: center;
      min-height: 100dvh;
      width: 100%;
      padding: clamp(1.5rem, 4vh, 3rem) clamp(1rem, 4vw, 2rem);
      box-sizing: border-box;
    }

    .pg-top {
      display: flex; align-items: center; justify-content: center;
      width: 100%;
    }
    .pg-mid {
      display: flex; align-items: center; justify-content: center;
      width: 100%;
    }
    .pg-bot {
      display: flex; align-items: center; justify-content: center;
      width: 100%;
    }

    /* Text anchored to top */
    .hero {
      font-family: var(--serif);
      font-size: clamp(1.8rem, 5.5vw, 4rem);
      font-weight: 600; font-style: italic;
      line-height: 1.05; text-align: center;
      color: var(--ink-3);
      opacity: 0; animation: popUp .7s .1s cubic-bezier(.34,1.56,.64,1) both;
      transition: color .6s;
    }
    body.boy .hero { color: var(--blue); }

    /* ── ORB ── */
    .orb-wrap {
      position: relative;
      width: clamp(180px, 46vmin, 320px);
      height: clamp(180px, 46vmin, 320px);
      flex-shrink: 0;
      perspective: 700px; opacity: 0;
      animation: popUp .7s .4s cubic-bezier(.34,1.56,.64,1) both;
    }

    .ripple {
      position: absolute; inset: 0; border-radius: 50%;
      opacity: 0;
      animation: rippleOut var(--rd) ease-out var(--rdel) infinite;
      border: 2px solid var(--rc);
    }
    .ripple:nth-child(1) { --rc: var(--blue);  --rd: 3s; --rdel: 0s;    }
    .ripple:nth-child(2) { --rc: #F4A0C0;      --rd: 3s; --rdel: 1.5s;  }
    body.boy .ripple { --rc: var(--blue); }
    @keyframes rippleOut {
      0%   { transform: scale(.55); opacity: .8; }
      100% { transform: scale(1.7);  opacity: 0; }
    }

    .orb-core {
      position: absolute; inset: 0; border-radius: 50%;
      background: transparent; border: 3px solid var(--ink-3);
      box-shadow: 0 4px 0 rgba(0,0,0,.06), 0 8px 32px rgba(187,168,152,.25);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      animation: orbBounce 2.8s ease-in-out infinite;
      transition: border-color .6s, box-shadow .6s;
    }
    body.boy .orb-core {
      border-color: var(--blue);
      box-shadow: 0 4px 0 rgba(0,0,0,.06), 0 8px 40px rgba(58,134,255,.3);
    }
    @keyframes orbBounce {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-6px) scale(1.02); }
    }

    .orb-core.spin { animation: spinFast 7s ease-in-out forwards; }
    @keyframes spinFast {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(5040deg); }
    }

    .orb-symbol {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 8vw, 3.4rem);
      font-style: italic; font-weight: 600;
      color: var(--yellow); user-select: none;
      animation: symPulse 2.8s ease-in-out infinite;
    }
    body.boy .orb-symbol { animation:none; color:var(--ink); font-style:normal; font-size:clamp(1.8rem,7vw,2.8rem); }
    @keyframes symPulse {
      0%,100% { transform:scale(1); color:var(--yellow); }
      50%      { transform:scale(1.12); color:var(--coral); }
    }

    .orb-img-wrap {
      position: absolute; inset: 0;
      border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .orb-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      mix-blend-mode: multiply;
      animation: orbBounce 2.8s ease-in-out infinite;
    }
    body.boy .orb-img { animation: none; mix-blend-mode: normal; }
    @keyframes dotFloat {
      0%,100% { opacity:0; transform:translateY(0) scale(.4); }
      40%      { opacity:.7; }
      70%      { opacity:.3; transform:translateY(-18px) scale(1.1); }
    }

    /* ── COUNTDOWN ── */
    .countdown-section {
      text-align:center;
      animation: popUp .7s .65s cubic-bezier(.34,1.56,.64,1) both;
      transition: opacity .4s, visibility .4s;
    }
    .countdown-section.hide {
      animation: none;
      opacity: 0; visibility: hidden;
      pointer-events: none;
    }

    .c-sup { font-size:1.1rem; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-3); font-weight:400; margin-bottom:.6rem; }
    .c-row { display:flex; align-items:flex-start; justify-content:center; gap:clamp(.4rem,2vw,1.2rem); }
    .c-block { display:flex; flex-direction:column; align-items:center; gap:.2rem; }
    .c-num {
      font-family:var(--serif);
      font-size:clamp(2.4rem,7vw,6rem);
      font-weight:600; line-height:1;
      min-width:clamp(2.6rem,7vw,6rem); text-align:center;
    }
    #cD { color: var(--blue); }
    #cH { color: #F4A0C0; }
    #cM { color: var(--blue); }
    #cS { color: #F4A0C0; }
    .c-num.tick { animation:numTick .14s ease; }
    @keyframes numTick {
      0%  { transform:translateY(-5px) scale(.9); opacity:.5; }
      100%{ transform:translateY(0) scale(1); opacity:1; }
    }
    .c-lbl { font-size:.7rem; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-3); font-weight:400; }
    .c-sep { font-family:var(--serif); font-size:clamp(2rem,5vw,4rem); font-weight:300; color:rgba(42,33,24,.12); line-height:1.2; align-self:flex-start; padding-top:.1rem; }

    /* ── BOTTOM SLOT STACK ── */
    .bot-stack {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      min-height: 8rem;
    }
    .arrived {
      display: flex;
      position: absolute;
      opacity: 0; visibility: hidden;
      transition: opacity .4s, visibility .4s;
      pointer-events: none;
    }
    .arrived.show {
      opacity: 1; visibility: visible;
      pointer-events: auto;
    }
    .btn-reveal {
      padding: 1rem 3rem;
      border: none;
      border-radius: 100px;
      background: var(--ink-3);
      color: white;
      font-family: var(--sans); font-size: .9rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 0 rgba(187,168,152,.4);
    }
    .btn-reveal:hover { transform:translateY(-2px); box-shadow:0 6px 0 rgba(187,168,152,.4); }
    .btn-reveal:active { transform:translateY(1px); box-shadow:0 2px 0 rgba(187,168,152,.4); }



    /* ── SPEAKER BUTTON ── */
    #speakerBtn { transition: opacity .2s; }
    #speakerBtn.muted { animation: speakerPulse 1.2s ease-in-out infinite; }
    @keyframes speakerPulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.88); }
    }

    /* ── BOCADILLOS ── */
    .bubble {
      display: inline-block;
      background: white;
      border: 2px solid var(--blue);
      border-radius: 1.2rem;
      padding: .55rem 1rem;
      font-family: var(--sans);
      font-size: clamp(.7rem, 2.5vw, .85rem);
      font-weight: 700;
      color: var(--blue);
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(58,134,255,.18);
      z-index: 10;
      animation: bubblePop .35s cubic-bezier(.34,1.56,.64,1) forwards,
                 bubbleFade .4s ease-in var(--blife) forwards;
    }
    @keyframes bubblePop {
      from { opacity:0; transform: scale(.5) translateY(8px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    @keyframes bubbleFade {
      from { opacity:1; transform: scale(1); }
      to   { opacity:0; transform: scale(.85) translateY(-6px); }
    }

    /* ── CONFETTI ── */
    .cf { position:fixed; top:-20px; pointer-events:none; z-index:999;
      animation: cfFall var(--cfd) linear var(--cfde) forwards;
      border-radius: var(--cfr); }
    @keyframes cfFall {
      0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity:1; }
      100% { transform: translateY(110vh) translateX(var(--cfx)) rotate(720deg); opacity:0; }
    }

    @keyframes popUp {
      from { opacity:0; transform:translateY(20px) scale(.95); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
  </style>
  <script src="./messages.js"></script>
</head>
<body>

<!-- SPEAKER ICON -->
<div id="speakerBtn" onclick="toggleMusic()" title="Activar música" class="muted" style="
  position:fixed; top:1.2rem; right:1.2rem; z-index:300;
  width:2.2rem; height:2.2rem;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  user-select:none;">
  <svg id="speakerIcon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke="#bba898"/>
    <path id="speakerWave1" d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="#bba898"/>
    <path id="speakerWave2" d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="#bba898"/>
    <line id="speakerMuteLine" x1="1" y1="1" x2="23" y2="23" stroke="#e53e3e" stroke-width="2"/>
  </svg>
</div>

<div id="pg">

  <div class="pg-top">
    <h1 class="hero">¿Seré niño o niña?</h1>
  </div>

  <div class="pg-mid" style="position:relative;">
    <div id="bubbleContainer" style="position:absolute; bottom:100%; width:100%; display:flex; justify-content:center; padding-bottom:.5rem; pointer-events:none;"></div>
    <div class="orb-wrap" id="orbWrap">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="orb-core" id="orbCore">
        <div class="orb-img-wrap">
          <img id="orbImg" class="orb-img" src="./bb.png" alt=""/>
        </div>
        <span class="orb-symbol orb-reveal-sym" id="orbSymbol" style="display:none"></span>
      </div>
    </div>

  </div>

  <div class="pg-bot" id="bottomSlot">
    <div class="bot-stack">
      <div class="arrived" id="arrived">
        <button class="btn-reveal" onclick="doReveal()">¡Descubrir!</button>
      </div>
      <div class="countdown-section" id="cdSection">
        <p class="c-sup">La revelación en</p>
        <div class="c-row" id="cRow">
          <div class="c-block"><div class="c-num" id="cD">––</div><div class="c-lbl">días</div></div>
          <div class="c-sep">·</div>
          <div class="c-block"><div class="c-num" id="cH">––</div><div class="c-lbl">horas</div></div>
          <div class="c-sep">·</div>
          <div class="c-block"><div class="c-num" id="cM">––</div><div class="c-lbl">min</div></div>
          <div class="c-sep">·</div>
          <div class="c-block"><div class="c-num" id="cS">––</div><div class="c-lbl">seg</div></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let targetDate = new Date('2026-03-07T14:51:00');
let ticker  = null;
let revealed = false;

const COLORS = ['#FF6B6B','#FFD166','#06D6A0','#9B72CF','#4ECDC4','#3A86FF','#FF9F1C'];

(function init() {
  buildBgPieces();
  startTicker();
})();

function buildBgPieces() {
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'bg-piece';
    const w = 8 + Math.random()*18;
    const h = Math.random()>.5 ? w : 5+Math.random()*8;
    const col = COLORS[~~(Math.random()*COLORS.length)];
    el.style.cssText = `width:${w}px;height:${h}px;background:${col};top:${Math.random()*100}%;left:${Math.random()*100}%;--op:${.06+Math.random()*.1};--bd:${4+Math.random()*6}s;--bdel:${-Math.random()*6}s;--dy:${(Math.random()-.5)*30}px;--rot:${Math.random()*360}deg;--br:${Math.random()>.5?'3px':'50%'};`;
    document.body.appendChild(el);
  }
}

function startTicker() {
  if (ticker) clearInterval(ticker);
  tick(); ticker = setInterval(tick, 1000);
}

function tick() {
  const cRow    = document.getElementById('cRow');
  const arrived = document.getElementById('arrived');
  const now     = new Date();

  const diff = targetDate - now;
  if (diff <= 0) {
    document.getElementById('cdSection').classList.add('hide');
    document.getElementById('arrived').classList.add('show');
    clearInterval(ticker); return;
  }
  cRow.style.visibility = 'visible';
  arrived.classList.remove('show');
  const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000),
        m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
  setN('cD',pad(d)); setN('cH',pad(h)); setN('cM',pad(m)); setN('cS',pad(s));
}

function pad(n) { return String(n).padStart(2,'0'); }
function setN(id,val) {
  const el=document.getElementById(id);
  if(el.textContent!==val){ el.classList.remove('tick'); void el.offsetWidth; el.classList.add('tick'); el.textContent=val; }
}

function doReveal() {
  if (revealed) return;
  revealed = true;

  // Hide the Descubrir button and speaker icon immediately
  document.getElementById('arrived').classList.remove('show');
  document.getElementById('speakerBtn').style.display = 'none';

  const core = document.getElementById('orbCore');
  const hero = document.querySelector('.hero');

  // 1. Stop bb.mp3, play spin.mp3
  stopBgMusic();
  const spinAudio = new Audio('./spin.mp3');
  spinAudio.volume = 0.8;
  spinAudio.play().catch(() => {});

  // 2. Start 7s spin
  core.classList.add('spin');

  // 3. Swap image, text AND color at 6000ms (in sync)
  setTimeout(() => {
    document.getElementById('orbImg').src = './bb_b.png';
    hero.textContent = '¡Soy un niño!';
    document.body.classList.add('boy');
  }, 6000);

  // 4. After spin (7s): reveal visual + start bb_b.mp3
  setTimeout(() => {
    document.getElementById('bottomSlot').style.visibility = 'hidden';
    core.classList.remove('spin');
    core.style.animation = 'orbBounce 2.8s ease-in-out infinite';
    spinAudio.pause();

    // bb_b.mp3 starts, then bb_c.mp3 loops forever
    const revealAudio = new Audio('./bb_b.mp3');
    revealAudio.volume = 0.8;
    revealAudio.play().catch(() => {});
    revealAudio.addEventListener('ended', () => {
      const cAudio = new Audio('./bb_c.mp3');
      cAudio.loop = true;
      cAudio.volume = 0.8;
      cAudio.play().catch(() => {});
    });
  }, 7000);

  // 5. Confetti + bubbles start after reveal
  setTimeout(() => {
    boom();
    setInterval(() => boom(), 5000);
    setTimeout(() => startBubbles(), 1500);
  }, 7500);
}

function boom() {
  const palette = ['#FF6B6B','#FFD166','#06D6A0','#3A86FF','#9B72CF','#FF9F1C','#4ECDC4','#ffffff','#74b3ff','#ffd0e8','#b8ffd9'];
  for (let i = 0; i < 280; i++) {
    const el = document.createElement('div');
    el.className = 'cf';
    const w = 5 + Math.random()*10, h = 5 + Math.random()*18, r = Math.random();
    el.style.cssText = `left:${Math.random()*100}vw;width:${w}px;height:${h}px;background:${palette[~~(Math.random()*palette.length)]};--cfd:${2+Math.random()*3}s;--cfde:${Math.random()*1.2}s;--cfx:${(Math.random()-.5)*360}px;--cfr:${r>.6?'50%':r>.3?'3px':'0'};`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ── BOCADILLOS ──
// Messages loaded from messages.js (window.BUBBLE_MESSAGES)
const BUBBLE_MESSAGES = (typeof window !== 'undefined' && window.BUBBLE_MESSAGES) ? window.BUBBLE_MESSAGES : ['¡Hola prima Sara!', '¡Hola tía María!'];

let bubbleIndex = 0;

function spawnBubble() {
  const msgs = (window.BUBBLE_MESSAGES && window.BUBBLE_MESSAGES.length) ? window.BUBBLE_MESSAGES : BUBBLE_MESSAGES;
  const container = document.getElementById('bubbleContainer');
  const msg = msgs[bubbleIndex % msgs.length];
  const lifeMs = 2500;

  const el = document.createElement('div');
  el.className = 'bubble';
  el.textContent = msg;
  el.style.setProperty('--blife', lifeMs + 'ms');
  container.appendChild(el);
  setTimeout(() => el.remove(), lifeMs + 400);
  bubbleIndex++;
}

function startBubbles() {
  spawnBubble();
  setInterval(spawnBubble, 3500);
}

// ── MUSIC ──
let musicOn = false;
let audio = null;

function initAudio() {
  if (audio) return;
  audio = new Audio('./bb.mp3');
  audio.loop = true;
  audio.volume = 0.5;
}

function toggleMusic() {
  initAudio();
  if (musicOn) {
    audio.pause();
    musicOn = false;
  } else {
    audio.play().catch(() => {});
    musicOn = true;
  }
  updateSpeakerIcon();
}

function updateSpeakerIcon() {
  const btn  = document.getElementById('speakerBtn');
  const mute = document.getElementById('speakerMuteLine');
  if (musicOn) {
    mute.style.display = 'none';
    btn.classList.remove('muted');
    btn.style.opacity = '.7';
  } else {
    mute.style.display = '';
    btn.classList.add('muted');
    btn.style.opacity = '';
  }
}

function stopBgMusic() {
  if (audio) { audio.pause(); audio.currentTime = 0; }
  musicOn = false;
  updateSpeakerIcon();
}

// Inicializar audio al cargar (sin autoplay — esperar al click del altavoz)
window.addEventListener('load', () => { initAudio(); });
</script>
</body>
</html>
